<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="As Leads Pro — Local business intelligence for marketing agencies. We find businesses with digital gaps so you can pitch with confidence.">
<title>As Leads Pro — Local Business Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #0A0F1E;
  --ink-2:   #3D4560;
  --ink-3:   #8892A4;
  --paper:   #FFFFFF;
  --surface: #F6F8FC;
  --border:  #E4E9F2;
  --blue:    #1B4FD8;
  --blue-lt: #EEF2FF;
  --green:   #059669;
  --red:     #DC2626;
  --amber:   #D97706;
  --mono:    'DM Mono', monospace;
  --sans-en: 'Inter', system-ui, sans-serif;
  --sans-ar: 'IBM Plex Sans Arabic', system-ui, sans-serif;
  --radius:  8px;
  --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans-en);
  color: var(--ink);
  background: var(--paper);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

html[dir="rtl"] body { font-family: var(--sans-ar); }
